* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 928px;
  height: 1152px;
  overflow: hidden;
  background: var(--color-canvas-top);
  font-family: var(--font-sans-jp);
  color: var(--color-text);
  text-rendering: geometricPrecision;
  -webkit-font-smoothing: antialiased;
}

body {
  display: block;
}

.artboard {
  position: relative;
  width: 928px;
  height: 1152px;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 28%),
    radial-gradient(circle at 80% 82%, rgba(var(--color-atmosphere-rgb), 0.4), rgba(var(--color-atmosphere-rgb), 0) 26%),
    linear-gradient(180deg, var(--color-canvas-top) 0%, var(--color-canvas-bottom) 100%);
}

.card {
  position: absolute;
  top: 14px;
  right: 14px;
  bottom: 14px;
  left: 14px;
  border-radius: 48px;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(var(--color-atmosphere-rgb), 0.18), rgba(255, 255, 255, 0) 18%, rgba(var(--color-accent-rgb), 0.06) 100%),
    linear-gradient(180deg, rgba(var(--color-card-rgb), 0.99), rgba(var(--color-card-rgb), 0.98));
  box-shadow:
    inset 0 0 0 1px rgba(var(--color-card-rgb), 0.55),
    inset 0 0 0 14px rgba(var(--color-atmosphere-rgb), 0.12);
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 12%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0) 22%),
    radial-gradient(circle at 78% 70%, rgba(var(--color-atmosphere-rgb), 0.24), rgba(var(--color-atmosphere-rgb), 0) 24%),
    linear-gradient(125deg, rgba(var(--color-atmosphere-rgb), 0.08), rgba(255, 255, 255, 0) 30%, rgba(var(--color-accent-rgb), 0.04) 100%);
}

.variant {
  position: absolute;
  inset: 0;
}

.copy-block {
  position: absolute;
  z-index: 2;
}

.eyebrow {
  margin: 0 0 18px;
  font-family: var(--mitozz-type-global-eyebrow-font-family);
  font-size: var(--mitozz-type-global-eyebrow-font-size);
  line-height: var(--mitozz-type-global-eyebrow-line-height);
  font-weight: var(--mitozz-type-global-eyebrow-font-weight);
  letter-spacing: var(--mitozz-type-global-eyebrow-letter-spacing);
}

.headline {
  margin: 0;
  font-family: var(--mitozz-type-global-headline-font-family);
  font-size: var(--mitozz-type-global-headline-font-size);
  line-height: var(--mitozz-type-global-headline-line-height);
  font-weight: var(--mitozz-type-global-headline-font-weight);
  letter-spacing: var(--mitozz-type-global-headline-letter-spacing);
}

.headline.small {
  font-size: var(--mitozz-type-global-headline-small-font-size);
  line-height: var(--mitozz-type-global-headline-small-line-height);
  letter-spacing: var(--mitozz-type-global-headline-small-letter-spacing);
}

.subline {
  margin: 0;
  font-family: var(--mitozz-type-global-subline-font-family);
  font-size: var(--mitozz-type-global-subline-font-size);
  line-height: var(--mitozz-type-global-subline-line-height);
  font-weight: var(--mitozz-type-global-subline-font-weight);
  color: var(--color-text-soft);
  letter-spacing: var(--mitozz-type-global-subline-letter-spacing);
}

.subline-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.accent-serif {
  font-family: var(--font-serif-accent);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.accent-latin {
  font-family: var(--font-serif-accent);
  font-weight: 600;
  letter-spacing: 0.03em;
}

.eyebrow,
.headline,
.subline,
.panel-kicker,
.panel-eyebrow,
.meta-label,
.meta-line,
.meta-tag {
  word-break: normal;
  overflow-wrap: normal;
  line-break: strict;
  hanging-punctuation: allow-end;
}

.headline,
.subline,
.panel-eyebrow,
.meta-line {
  text-wrap: balance;
}

.rule {
  position: absolute;
  z-index: 2;
  height: 2px;
  background: linear-gradient(90deg, rgba(var(--color-structure-rgb), 0), rgba(var(--color-structure-rgb), 0.42) 9%, rgba(var(--color-structure-rgb), 0.42) 91%, rgba(var(--color-structure-rgb), 0));

:root {
  --layout-grid-columns: 12;
  --layout-column-gap: 18px;
  --layout-module-gap: 18px;
  --layout-gutter-inline: 74px;
  --layout-gutter-block-start: 82px;
  --layout-gutter-block-end: 92px;
  --story-gutter-inline: 126px;
  --story-gutter-block-start: 126px;
  --story-gutter-block-end: 156px;
}

.layout-grid-12 {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  column-gap: var(--layout-column-gap);
}

.layout-stack {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.layout-stack-xs {
  gap: 6px;
}

.layout-stack-sm {
  gap: 10px;
}

.layout-stack-md {
  gap: 18px;
}

.layout-stack-lg {
  gap: 28px;
}

.layout-cluster {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
}

.layout-equal-columns {
  display: grid;
  gap: var(--layout-module-gap);
  align-items: stretch;
}

.layout-equal-columns.cols-2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.layout-equal-columns.cols-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.layout-equal-columns.cols-4 {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.layout-equal-columns > * {
  min-width: 0;
}

.layout-cell-center {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  text-align: center;
}

.variant.portrait-cover,
.variant.editorial-criteria,
.variant.editorial-close,
.variant.education-cover,
.variant.education-body,
.variant.education-close {

  <body>
    <main class="artboard">
      <section class="card">
        <div class="variant" id="variantRoot"></div>
      </section>
    </main>

    <script>
      var data = {"template":"trust-carousel","variant":"editorial-close","font_profile":"humanist_sans","canvas":{"width":928,"height":1152},"panel":{"index":"03","eyebrow":"Typography Check"},"copy":{"headline_lines":["見え方より、","読みやすさで","整える。"],"subline_lines":["テンプレート側でも同じ書体ルールを使う。","それが今回の確認ポイントです。"]},"meta":{"label":"Shared Typography","body_lines":["HTML/CSS テンプレートと PowerShell compositor が、","同じ typography token source を読む状態を確認。"],"tags":["humanist_sans","token-driven"]},"rule":true};
      var variantRoot = document.getElementById("variantRoot");
      variantRoot.className = "variant " + data.variant;

      if (data.canvas && data.canvas.width) {
        document.documentElement.style.width = data.canvas.width + "px";
        document.documentElement.style.height = data.canvas.height + "px";
        document.body.style.width = data.canvas.width + "px";
        document.body.style.height = data.canvas.height + "px";
        document.getElementsByClassName("artboard")[0].style.width = data.canvas.width + "px";
        document.getElementsByClassName("artboard")[0].style.height = data.canvas.height + "px";
      }

      function appendHeadlineLines(target, lines, small) {
        var i;
        for (i = 0; i < lines.length; i += 1) {
          var headline = document.createElement("p");
          headline.className = small ? "headline small" : "headline";
          headline.textContent = lines[i];
          target.appendChild(headline);
        }
      }

      function appendMetaBlock(target, data) {
        if (!data) {
          return;
        }

        if (data.label) {
          var label = document.createElement("p");
          label.className = "meta-label";
          label.textContent = data.label;
          target.appendChild(label);
        }

        if (data.body_lines && data.body_lines.length) {
          var body = document.createElement("div");
          body.className = "meta-body";
          var i;
          for (i = 0; i < data.body_lines.length; i += 1) {
            var line = document.createElement("p");
            line.className = "meta-line";
            line.textContent = data.body_lines[i];
            body.appendChild(line);
          }
          target.appendChild(body);
        }

        if (data.tags && data.tags.length) {
          var tags = document.createElement("div");
          tags.className = "meta-tags";
          var j;
          for (j = 0; j < data.tags.length; j += 1) {
            var tag = document.createElement("span");
            tag.className = "meta-tag";
            tag.textContent = data.tags[j];
            tags.appendChild(tag);
          }
          target.appendChild(tags);
        }
      }

      if (data.variant === "portrait-cover") {
        var media = document.createElement("div");
        media.className = "media";
        var imageSource = data.image.uri;
        if (!imageSource && data.image.path) {
          if (data.image.path.indexOf("file://") === 0) {
            imageSource = data.image.path;
          } else if (data.image.path.charAt(0) === "/") {
            imageSource = "file://" + data.image.path;
          } else {
            imageSource = data.image.path;
          }
        }
        media.style.backgroundImage = "url('" + imageSource + "')";
        if (data.image.position) {
          media.style.backgroundPosition = data.image.position;
        }
        variantRoot.appendChild(media);

        var mask = document.createElement("div");
        mask.className = "media-mask";
        variantRoot.appendChild(mask);

        var copy = document.createElement("div");
        copy.className = "copy-block";

        if (data.copy.eyebrow) {
          var eyebrow = document.createElement("p");
          eyebrow.className = "eyebrow";
          eyebrow.textContent = data.copy.eyebrow;
          copy.appendChild(eyebrow);
        }

        var lines = document.createElement("div");
        lines.className = "copy-lines";
        appendHeadlineLines(lines, data.copy.headline_lines, false);
        copy.appendChild(lines);
        variantRoot.appendChild(copy);
      }

      if (data.variant === "editorial-criteria" || data.variant === "editorial-close") {
        if (data.panel) {
          var panel = document.createElement("div");
          panel.className = "editorial-panel";

          if (data.panel.index) {
            var indexBubble = document.createElement("div");
            indexBubble.className = "panel-index";
            indexBubble.textContent = data.panel.index;
            panel.appendChild(indexBubble);
          }

          if (data.panel.kicker || data.panel.eyebrow) {
            var panelCopy = document.createElement("div");
            panelCopy.className = "panel-copy";
            if (!data.panel.kicker) {
              panelCopy.className += " no-kicker";
            }

            if (data.panel.kicker) {
              var kicker = document.createElement("p");
              kicker.className = "panel-kicker";
              kicker.textContent = data.panel.kicker;
              panelCopy.appendChild(kicker);
            }

            if (data.panel.eyebrow) {
              var panelEyebrow = document.createElement("p");
              panelEyebrow.className = "panel-eyebrow";
              panelEyebrow.textContent = data.panel.eyebrow;
              panelCopy.appendChild(panelEyebrow);
            }

            panel.appendChild(panelCopy);
          }

          variantRoot.appendChild(panel);
        }

        var editorialCopy = document.createElement("div");
        var editorialLines = document.createElement("div");

        editorialCopy.className = "copy-block";
        editorialLines.className = "copy-lines";
        appendHeadlineLines(editorialLines, data.copy.headline_lines, data.variant === "editorial-close");

        editorialCopy.appendChild(editorialLines);

        if (data.copy.subline_lines && data.copy.subline_lines.length) {
          var sublineBlock = document.createElement("div");
          sublineBlock.className = "subline-block";
          var k;
          for (k = 0; k < data.copy.subline_lines.length; k += 1) {
            var sublineLine = document.createElement("p");
            sublineLine.className = "subline";
            sublineLine.textContent = data.copy.subline_lines[k];
            sublineBlock.appendChild(sublineLine);
          }
          editorialCopy.appendChild(sublineBlock);
        } else if (data.copy.subline) {
          var subline = document.createElement("p");
          subline.className = "subline";
          subline.textContent = data.copy.subline;
          editorialCopy.appendChild(subline);
        }

        variantRoot.appendChild(editorialCopy);

        if (data.meta) {
          var meta = document.createElement("div");
          meta.className = "editorial-meta";
          appendMetaBlock(meta, data.meta);
          variantRoot.appendChild(meta);
        }

        if (data.rule !== false) {
          var rule = document.createElement("div");
          rule.className = "rule";
          variantRoot.appendChild(rule);
        }
      }
